server {
    listen 5173;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to core service (preserve /api/v1 path)
    location /api/ {
        proxy_pass http://core:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Health check proxy
    location /health {
        proxy_pass http://core:8000;
        proxy_set_header Host $host;
    }
}
